# Docling Serve - Document processing with MCP support (configured in opencode.json)
# OpenClaw - AI Agent with MCP support (configured in opencode.json)
name: $DEV_CONTAINER_NAME
services:
  devcontainer:
    container_name: $DEV_CONTAINER_NAME
    # Extra resources for running Google Chrome smoothly inside the container.
    # (values can be tuned via .env if needed)
    shm_size: 2gb
    mem_limit: 8g
    cpus: 4.0
    env_file: .env
    environment:
      - DISPLAY=${DISPLAY}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - PULSE_SERVER=tcp:host.docker.internal:4713
    volumes:
      - ../:/workspace
      - ${DOWNLOADS_PATH}:/home/$DEV_CONTAINER_NAME/downloads
      - ${WORK_PATH}:/home/$DEV_CONTAINER_NAME/work
      - ${ORG_PATH}:/home/$DEV_CONTAINER_NAME/org/work
      - ${INBOX_ORG_PATH}:/home/$DEV_CONTAINER_NAME/org/inbox.org
      - ./bash_history:/home/$DEV_CONTAINER_NAME/.bash_history
      - openclaw_cache:/home/$DEV_CONTAINER_NAME/.openclaw/cache
      - openclaw_state:/home/$DEV_CONTAINER_NAME/.openclaw/state
      - opencode_data:/home/$DEV_CONTAINER_NAME/.local/share/opencode
      - user_cache:/home/$DEV_CONTAINER_NAME/.cache
      - apt_cache:/var/cache/apt/archives
      - apt_lists:/var/lib/apt/lists
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /mnt/wslg:/mnt/wslg
      - ${HOME}/.config/pulse:/root/.config/pulse:ro
      - /var/run/dbus:/run/dbus
    build:
      context: ../
      dockerfile: ./.devcontainer/Dockerfile
      args:
        USER_ID: $UID
        USERNAME: $DEV_CONTAINER_NAME
        IMAGE: $IMAGE
        PORT: $PORT
        VSEGPT_API_KEY: $VSEGPT_API_KEY
        VSEGPT_API: $VSEGPT_API
        OPENCLAW_TOKEN: $OPENCLAW_TOKEN
        MATTERMOST_URL: $MATTERMOST_URL
        MATTERMOST_ACCESS_TOKEN: $MATTERMOST_ACCESS_TOKEN
        MATTERMOST_TEAM_ID: $MATTERMOST_TEAM_ID
        MATTERMOST_TOKEN_ID: $MATTERMOST_TOKEN_ID
    stdin_open: true
    tty: true
    ports:
      - $PORT:$PORT # OpenCode
      - 18789:18789

  docling-serve:
    image: ghcr.io/docling-project/docling-serve-cpu:latest
    container_name: $DEV_CONTAINER_NAME-docling-serve
    restart: always
    command: >
      /bin/bash -c '
        sed -i "s/enable_dns_rebinding_protection=True/enable_dns_rebinding_protection=False/g" /opt/app-root/lib*/python*/site-packages/mcp/server/fastmcp/server.py 2>/dev/null || true;
        exec docling-mcp-server --transport streamable-http --port 5002 --host 0.0.0.0
      '
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ../:/workspace
      - ${DOWNLOADS_PATH}:/home/$COMPOSE_PROJECT_NAME/downloads
      - ${WORK_PATH}:/home/$COMPOSE_PROJECT_NAME/work
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/mcp"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

